let CU=null,TAB="update";

function ini(n){return n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();}
function escHtml(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function fmtDate(d){try{return new Date(d).toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"});}catch{return d;}}
function lsGet(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}}
function lsSave(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}

document.getElementById("loginBtn").onclick=doLogin;
document.getElementById("uInp").onkeydown=e=>{if(e.key==="Enter")document.getElementById("pInp").focus();};
document.getElementById("pInp").onkeydown=e=>{if(e.key==="Enter")doLogin();};
document.getElementById("logoutBtn").onclick=doLogout;

async function doLogin(){
  const uid=document.getElementById("uInp").value.trim().toLowerCase();
  const pwd=document.getElementById("pInp").value;
  const u=USERS.find(x=>x.id===uid);
  if(!u){document.getElementById("errBox").style.display="block";document.getElementById("errBox").textContent="User not found.";return;}

  // Check custom password from database first (unless admin which is locked)
  let validPass=u.pass;
  if(!u.locked){
    try{
      const {data:pwData,error:pwErr}=await sb.from("user_passwords").select("password").eq("user_id",uid).limit(1);
      if(!pwErr&&pwData&&pwData.length>0&&pwData[0].password){validPass=pwData[0].password;}
    }catch(e){console.log("pw fetch error",e);}
  }

  if(pwd!==validPass){document.getElementById("errBox").style.display="block";document.getElementById("errBox").textContent="Wrong password.";return;}

  CU=u;
  document.getElementById("errBox").style.display="none";
  document.getElementById("loginWrap").style.display="none";
  document.getElementById("appWrap").style.display="flex";
  document.getElementById("hDate").textContent=TSTR;
  const col=DC[u.dept]||"#6b7280";
  const av=document.getElementById("hAvatar");
  av.textContent=ini(u.name);
  av.style.cssText=`width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;background:${col}33;border:2px solid ${col};color:${col};`;
  document.getElementById("hName").textContent=u.name;
  renderTabs();renderContent();
}

async function doLogout(){
  // Record logout time in attendance
  if(CU && !CU.isAdmin){
    const now=new Date();
    const logoutTime=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    // Update today's attendance with logout time
    await sb.from("attendance").update({logout_time:logoutTime}).eq("employee_id",CU.id).eq("date",TKEY).catch(()=>{});
  }
  CU=null;
  document.getElementById("loginWrap").style.display="flex";
  document.getElementById("appWrap").style.display="none";
  document.getElementById("uInp").value="";
  document.getElementById("pInp").value="";
}

function renderTabs(){
  const isAdmin=CU.isAdmin;
  const showExpenses=CU.isAdmin||CU.id==="piyush";
  const tabs=[
    {id:"update",label:"📝 Evening Update"},
    {id:"attendance",label:"🕐 Attendance"},
    {id:"clients",label:"📊 Client Tracker"},
    {id:"planner",label:"📅 Content Planner"},
    {id:"shoot",label:"📸 Shoot Checklist"},
    ...(showExpenses?[{id:"expenses",label:"💰 Expenses"}]:[]),
    ...(isAdmin?[{id:"team",label:"👥 Team View"},{id:"history",label:"🗂️ History"},{id:"attreport",label:"📊 Attendance Report"},{id:"adminpanel",label:"🔐 Manage Passwords"}]:[{id:"myhistory",label:"🗂️ My History"}])
  ];
  document.getElementById("tabsRow").innerHTML=tabs.map(t=>
    `<button class="tab-btn${TAB===t.id?" active":""}" onclick="switchTab('${t.id}')">${t.label}</button>`

  const c=document.getElementById("mainContent");
  if(TAB==="update")c.innerHTML=buildUpdateForm();
  else if(TAB==="clients"){c.innerHTML='<div class="loading">⏳ Loading...</div>';loadClients();}

  else if(TAB==="team"){c.innerHTML='<div class="loading">⏳ Loading...</div>';loadTeam();}
  else if(TAB==="history"){c.innerHTML=buildHistoryPage();loadHistory();}
  else if(TAB==="myhistory"){c.innerHTML=buildMyHistoryPage();loadMyHistory();}
  else if(TAB==="adminpanel"){c.innerHTML='<div class="loading">⏳ Loading...</div>';loadAdminPanel();}

function buildUpdateForm(){
  const col=DC[CU.dept]||"#6b7280";
  const hr=new Date().getHours();
  const rem=hr<18?`<div class="reminder-banner">⏰ Evening update 6 PM ke baad submit karo. Abhi ${new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})} ho rahe hain.</div>`:"";
  return `${rem}<div class="card" style="border:1px solid ${col}33">
    <div class="update-header">
      <div class="update-avatar" style="background:${col}22;border:2px solid ${col};color:${col}">${ini(CU.name)}</div>
      <div><div style="font-size:17px;font-weight:700">🌙 Evening Update — ${TSTR}</div><div style="color:${col};font-size:12px">${CU.name} • ${CU.role}</div></div>
      <select id="statusSel" style="margin-left:auto"><option>Not Started</option><option>In Progress</option><option selected>Done</option></select>
    </div>
    <div style="margin-bottom:16px"><label class="form-label">✅ Aaj kya kiya?</label><textarea id="kyaKiyaTxt" placeholder="Aaj ka poora kaam batao..."></textarea></div>
    <div style="margin-bottom:16px"><label class="form-label">📋 Completed Tasks</label>
      <div id="taskList"><input class="task-input" id="tk_0" placeholder="Task 1" /><input class="task-input" id="tk_1" placeholder="Task 2" /></div>
      <button class="btn-add" onclick="addTask()">+ Add Task</button></div>
    <div style="margin-bottom:16px"><label class="form-label">⏳ Pending / Kal ke liye</label><textarea id="pendingTxt" style="min-height:70px" placeholder="Jo kaam aaj nahi hua..."></textarea></div>
    ${(CU.dept==="Sales"||CU.dept==="Management")?`<div style="margin-bottom:16px"><label class="form-label">📞 Calls Count</label><input class="task-input" id="callsTxt" placeholder="Kitne calls kiye aaj" /></div>`:""}
    <div style="display:flex;align-items:center;margin-top:8px"><button class="btn-save" onclick="saveUpdate()">💾 Submit Evening Update</button><span class="saved-tag" id="savedTag">✓ Saved!</span></div>
  </div>`;
}

function addTask(){
  const list=document.getElementById("taskList");
  const i=list.children.length;
  const inp=document.createElement("input");
  inp.className="task-input";inp.id=`tk_${i}`;inp.placeholder=`Task ${i+1}`;
  list.appendChild(inp);
}

async function saveUpdate(){
  const tasks=[];
  document.querySelectorAll("[id^='tk_']").forEach(el=>{if(el.value)tasks.push(el.value);});
  const callsEl=document.getElementById("callsTxt");
  const data={employee_id:CU.id,employee_name:CU.name,role:CU.role,dept:CU.dept,date:TKEY,
    kya_kiya:document.getElementById("kyaKiyaTxt").value,
    pending:document.getElementById("pendingTxt").value,
    calls:callsEl?callsEl.value:"",status:document.getElementById("statusSel").value,
    tasks:JSON.stringify(tasks),submitted_at:new Date().toLocaleTimeString("en-IN",{hour:"2-digit",minute:"2-digit"})};
  const {error}=await sb.from('daily_updates').upsert(data,{onConflict:'employee_id,date'});
  const tag=document.getElementById("savedTag");
  tag.style.color=error?"#f87171":"#16a34a";
  tag.textContent=error?"❌ Error!":"✓ Saved!";
  tag.style.display="inline";

  // Check pending alerts for today
  const today=DAYS[new Date().getDay()===0?6:new Date().getDay()-1];
  let alerts=[];
  Object.keys(WEEKLY_PLAN).forEach(cid=>{
    const todayPost=WEEKLY_PLAN[cid].find(p=>p.day===today);
    if(todayPost){
      const stKey=`ps_${cid}_${today}_${TKEY}`;
      const status=localStorage.getItem(stKey)||"pending";
      if(status==="pending"){
        const cname=CLIENT_INFO[cid]?.category?.split(" ")[0]||cid;
        const cn=CLIENTS.find(x=>x.id===cid)?.name||cid;
        alerts.push(`${cn} — ${todayPost.type} (${todayPost.time})`);
      }
    }
  });

  let alertHtml="";

    alertHtml=`<div class="alert-banner">🔔 <b>Aaj ke pending posts:</b> ${alerts.join(" | ")} — Content Planner me jaake mark karo!</div>`;

  const doneData=CLIENTS.map(c=>{const d=cm[c.id]||{};return (d.reels||0)+(d.carousels||0)+(d.posts||0)+(d.stories||0);});
  const targetData=CLIENTS.map(c=>c.t.reels+c.t.carousels+c.t.posts+c.t.stories);

  document.getElementById("mainContent").innerHTML=`
  ${alertHtml}
  <div class="chart-wrap">
    <div class="chart-title">📊 Weekly Progress — Done vs Target</div>
    <div style="position:relative;height:180px"><canvas id="progressChart"></canvas></div>
  </div>
  <div class="section-title">📊 Client Work Tracker — This Week</div>
  <div class="grid2">${CLIENTS.map(c=>{
    const d=cm[c.id]||{reels:0,carousels:0,posts:0,stories:0,notes:""};
    const tot=(d.reels||0)+(d.carousels||0)+(d.posts||0)+(d.stories||0);
    const tar=c.t.reels+c.t.carousels+c.t.posts+c.t.stories;
    const pct=Math.min(100,Math.round(tot/tar*100));
    return `<div class="client-card" style="background:${c.bg};border:1px solid ${c.color}44">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">
        <span style="font-size:22px">${c.icon}</span>
        <div><div style="font-weight:700;font-size:14px">${c.name}</div>
        <div style="color:${c.color};font-size:11px" id="pct_${c.id}">${pct}% complete</div></div>
      </div>
      <div class="progress-bg"><div class="progress-fill" id="bar_${c.id}" style="background:${c.color};width:${pct}%"></div></div>
      ${[{key:"reels",label:"🎬 Reels",tar:c.t.reels},{key:"carousels",label:"📂 Carousels",tar:c.t.carousels},{key:"posts",label:"🖼️ Posts",tar:c.t.posts},{key:"stories",label:"📱 Stories",tar:c.t.stories}].map(r=>`
      <div class="counter-row">
        <span style="color:#d1d5db;font-size:13px">${r.label}</span>
        <div class="counter-right">
          <span class="target-label">Target:${r.tar}</span>
          <button class="btn-minus" onclick="updClient('${c.id}','${r.key}',-1,'${c.color}',${r.tar})">−</button>
          <span class="count-num" id="cv_${c.id}_${r.key}" style="color:${(d[r.key]||0)>=r.tar?c.color:"#fff"}">${d[r.key]||0}</span>
          <button class="btn-plus" style="background:${c.color}" onclick="updClient('${c.id}','${r.key}',1,'${c.color}',${r.tar})">+</button>
        </div>
      </div>`).join("")}
      <textarea class="client-note" placeholder="Notes / pending / issues..." onchange="saveNote('${c.id}',this.value)">${escHtml(d.notes||"")}</textarea>
    </div>`;
  }).join("")}</div>`;

  // Init chart
  setTimeout(()=>{
    const ctx=document.getElementById("progressChart");
    if(!ctx)return;
    new Chart(ctx,{
      type:"bar",
      data:{
        labels:chartLabels,
        datasets:[
          {label:"Done",data:doneData,backgroundColor:["#f9731688","#ec489988","#14b8a688","#eab30888","#a78bfa88"],borderColor:["#f97316","#ec4899","#14b8a6","#eab308","#a78bfa"],borderWidth:2,borderRadius:6},
          {label:"Target",data:targetData,backgroundColor:"#ffffff11",borderColor:"#ffffff33",borderWidth:1,borderRadius:6}
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:true,labels:{color:"#9ca3af",font:{size:11}}}},scales:{x:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"#1e1e2e"}},y:{ticks:{color:"#6b7280",font:{size:10}},grid:{color:"#1e1e2e"},beginAtZero:true}}}
    });
  },100);
}

async function updClient(cid,field,delta,color,tar){
  const c=CLIENTS.find(x=>x.id===cid);
  const el=document.getElementById(`cv_${cid}_${field}`);
  const newVal=Math.max(0,(parseInt(el.textContent)||0)+delta);
  el.textContent=newVal;el.style.color=newVal>=tar?color:"#fff";
  await sb.from('client_tracker').upsert({client_id:cid,date:TKEY,[field]:newVal},{onConflict:'client_id,date'});
  const allF=["reels","carousels","posts","stories"];
  const tot=allF.reduce((s,f)=>{const v=document.getElementById(`cv_${cid}_${f}`);return s+(v?parseInt(v.textContent)||0:0);},0);
  const ttar=c.t.reels+c.t.carousels+c.t.posts+c.t.stories;
  const pct=Math.min(100,Math.round(tot/ttar*100));
  const bar=document.getElementById(`bar_${cid}`);const pctEl=document.getElementById(`pct_${cid}`);
  if(bar)bar.style.width=pct+"%";if(pctEl)pctEl.textContent=pct+"% complete";
}

  await sb.from("client_tracker").upsert({client_id:cid,date:TKEY,notes:val},{onConflict:"client_id,date"});
}

  document.getElementById("shoot-"+id).classList.add("active");
  btn.classList.add("active");
}

function saveCheck(key,val,lblId){
  localStorage.setItem(key,val?"1":"0");
  const lbl=document.getElementById(lblId);
  if(lbl)lbl.className="check-label"+(val?" done":"");
}

function resetChecklist(id){
  const items=SHOOT_CHECKLISTS[id];
  items.forEach((_,idx)=>{
    const ck=`shoot_${id}_${idx}`;
    localStorage.removeItem(ck);
    const cb=document.getElementById(ck);
    const lbl=document.getElementById("lbl_"+ck);
    if(cb)cb.checked=false;
    if(lbl)lbl.className="check-label";
  });
}

// ═══ ATTENDANCE ═══
const OFFICE_LAT = 23.0522;
const OFFICE_LNG = 72.5339;
const OFFICE_RADIUS = 300; // meters
const PRESENT_CUTOFF = "10:30";
const LATE_CUTOFF = "12:00";

function getDistanceMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2-lat1)*Math.PI/180;
  const dLng = (lng2-lng1)*Math.PI/180;
  const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
    Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*
    Math.sin(dLng/2)*Math.sin(dLng/2);
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function getAttStatus(timeStr) {
  if (!timeStr) return null;
  const [h, m] = timeStr.split(":").map(Number);
  const mins = h * 60 + m;
  const presentMins = 10*60+30;
  const lateMins = 12*60;
  if (mins <= presentMins) return "present";
  if (mins < lateMins) return "late";
  return "halfday";
}

function attBadge(status) {
  const map = {
    present: {bg:"#16a34a22",color:"#4ade80",label:"✅ Present"},
    late: {bg:"#f59e0b22",color:"#fbbf24",label:"⚠️ Late"},
    halfday: {bg:"#f97316",color:"#fff",label:"🟡 Half Day"},
    absent: {bg:"#ef444422",color:"#f87171",label:"❌ Absent"},
    weekoff: {bg:"#1a1a2e",color:"#6b7280",label:"🔵 Week Off"},
    leave: {bg:"#7c3aed22",color:"#a78bfa",label:"🟣 Leave"},
  };
  const s = map[status] || map.absent;
  return `<span class="att-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;
}

    actionHtml = `
    <div class="location-err" id="locErr">❌ Aap office se bahut door hain! Office aake attendance mark karo. (100-150m radius me hona zaroori hai)</div>

  }

  const lateCount = monthAtt.filter(a=>a.status==="late").length;
  const halfCount = monthAtt.filter(a=>a.status==="halfday").length;
  const absentCount = monthAtt.filter(a=>a.status==="absent").length;

async function markAttendance() {
  const btn = document.getElementById("markBtn");
  const errEl = document.getElementById("locErr");
  btn.disabled = true;
  btn.textContent = "📡 Location check ho rahi hai...";
  errEl.classList.remove("show");

  if (!navigator.geolocation) {
    btn.textContent = "❌ GPS not supported";
    return;
  }

  navigator.geolocation.getCurrentPosition(async pos => {
    const dist = getDistanceMeters(pos.coords.latitude, pos.coords.longitude, OFFICE_LAT, OFFICE_LNG);
    
    if (dist > OFFICE_RADIUS) {
      errEl.classList.add("show");
      errEl.textContent = `❌ Aap office se ${Math.round(dist)}m door hain! Office aake attendance mark karo. (${OFFICE_RADIUS}m radius me hona zaroori hai)`;
      btn.disabled = false;
      btn.textContent = "📍 Office Se Attendance Mark Karo";
      return;
    }

    const now = new Date();
    const timeStr = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
    const status = getAttStatus(timeStr);

    const {error} = await sb.from("attendance").upsert({
      employee_id: CU.id,
      employee_name: CU.name,
      role: CU.role,
      dept: CU.dept,
      date: TKEY,
      login_time: timeStr,
      status: status,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    }, {onConflict: "employee_id,date"});

    if (error) {
      btn.textContent = "❌ Error! Try again.";
      btn.disabled = false;
    } else {
      loadAttendance();
    }
  }, err => {
    errEl.classList.add("show");
    errEl.textContent = "❌ Location access denied. Settings me GPS allow karo.";
    btn.disabled = false;
    btn.textContent = "📍 Office Se Attendance Mark Karo";
  }, {enableHighAccuracy: true, timeout: 10000});
}

  const presentCounts = {};
  const lateCounts = {};
  const absentCounts = {};
  const halfCounts = {};

  members.forEach(u => {

    lateCounts[u.id] = allAtt.filter(a=>a.employee_id===u.id&&a.status==="late").length;
    halfCounts[u.id] = allAtt.filter(a=>a.employee_id===u.id&&a.status==="halfday").length;
    absentCounts[u.id] = allAtt.filter(a=>a.employee_id===u.id&&a.status==="absent").length;
  });

  const totalPresent = allAtt.filter(a=>a.status==="present").length;
  const totalLate = allAtt.filter(a=>a.status==="late").length;
  const totalAbsent = allAtt.filter(a=>a.status==="absent").length;

  document.getElementById("mainContent").innerHTML = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div class="section-title" style="margin-bottom:0">📊 Attendance Report — ${TKEY.slice(0,7)}</div>
    <div style="display:flex;gap:8px">
      <button class="refresh-btn" onclick="autoMarkAbsent()">🔄 Auto-Mark Absent</button>
      <button class="refresh-btn" onclick="loadAttReport()">🔄 Refresh</button>
    </div>
  </div>
  <div class="att-info-grid" style="margin-bottom:20px">
    <div class="att-info-box" style="border:1px solid #16a34a44"><div class="att-info-val" style="color:#4ade80">${totalPresent}</div><div class="att-info-lbl">Total Present</div></div>
    <div class="att-info-box" style="border:1px solid #f59e0b44"><div class="att-info-val" style="color:#fbbf24">${totalLate}</div><div class="att-info-lbl">Total Late</div></div>
    <div class="att-info-box" style="border:1px solid #ef444444"><div class="att-info-val" style="color:#f87171">${totalAbsent}</div><div class="att-info-lbl">Total Absent</div></div>
  </div>
  <div style="background:#111118;border:1px solid #1e1e2e;border-radius:14px;overflow:hidden">
    <div style="padding:14px 16px;border-bottom:1px solid #1e1e2e;display:grid;grid-template-columns:1fr 1fr 80px 80px 80px 80px 160px;gap:8px;font-size:11px;color:#6b7280;text-transform:uppercase">
      <span>Name</span><span>Role</span><span>Present</span><span>Late</span><span>Half</span><span>Absent</span><span>Today + Timing</span>
    </div>
    ${members.map(u => {
      const col = DC[u.dept]||"#6b7280";
      const todayAttItem = allAtt.find(a=>a.employee_id===u.id&&a.date===TKEY);
      return `<div class="att-row">
        <div style="display:flex;align-items:center;gap:8px;min-width:100px">
          <div class="avatar" style="width:28px;height:28px;background:${col}22;border:1px solid ${col};color:${col};font-size:10px">${ini(u.name)}</div>
          <span style="font-weight:600;font-size:13px">${u.name}</span>
        </div>
        <span style="font-size:11px;color:#6b7280">${u.role}</span>
        <span style="color:#4ade80;font-weight:700;text-align:center">${presentCounts[u.id]||0}</span>
        <span style="color:#fbbf24;font-weight:700;text-align:center">${lateCounts[u.id]||0}</span>
        <span style="color:#fb923c;font-weight:700;text-align:center">${halfCounts[u.id]||0}</span>
        <span style="color:#f87171;font-weight:700;text-align:center">${absentCounts[u.id]||0}</span>
        <div style="display:flex;flex-direction:column;gap:4px">
          <div style="display:flex;gap:4px;align-items:center">
            ${attBadge(todayAttItem?.status||"absent")}
            <select onchange="adminOverride('${u.id}',this.value)" style="background:#1a1a2e;border:1px solid #2d2d44;border-radius:6px;padding:2px 6px;color:#fff;font-size:10px;cursor:pointer">
              <option value="">Edit</option>
              <option value="present">Present</option>
              <option value="late">Late</option>
              <option value="halfday">Half Day</option>
              <option value="absent">Absent</option>
              <option value="leave">Leave</option>
              <option value="weekoff">Week Off</option>
            </select>
          </div>
          <div style="font-size:10px;color:#6b7280">
            🕐 In: ${todayAttItem?.login_time||"—"} 
            ${todayAttItem?.logout_time?`• Out: <span style="color:${todayAttItem.logout_time<"19:00"?"#f87171":"#4ade80"}">${todayAttItem.logout_time}</span>`:`• <span style="color:#f59e0b">Not logged out</span>`}
          </div>
        </div>
      </div>`;
    }).join("")}
  </div>`;
}

async function adminOverride(empId, status) {
  if (!status) return;
  const u = USERS.find(x=>x.id===empId);
  await sb.from("attendance").upsert({
    employee_id: empId,
    employee_name: u?.name||empId,
    role: u?.role||"",
    dept: u?.dept||"",
    date: TKEY,
    status: status,
    login_time: status==="absent"?"—":"admin override"
  }, {onConflict:"employee_id,date"});
  loadAttReport();
}

async function autoMarkAbsent() {
  const members = USERS.filter(u=>!u.isAdmin);
  const now = new Date();
  if (now.getHours() < 12) {
    alert("Auto-absent sirf dopahar 12 baje ke baad kar sakte ho.");
    return;
  }
  const isSunday = now.getDay() === 0;
  for (const u of members) {
    const {data} = await sb.from("attendance").select("id").eq("employee_id",u.id).eq("date",TKEY).maybeSingle();
    if (!data) {
      await sb.from("attendance").insert({
        employee_id:u.id, employee_name:u.name, role:u.role, dept:u.dept,
        date:TKEY, status:isSunday?"weekoff":"absent", login_time:"—"
      });
    }
  }
  loadAttReport();
  alert("✅ Jo log nahi aaye unhe absent/weekoff mark kar diya!");
}
</script>
</body>
</html>

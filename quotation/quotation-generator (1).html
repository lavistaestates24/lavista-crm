<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotation Generator</title>
<style>
  :root{
    --ink:#15130f;
    --panel:#1c1a15;
    --line:rgba(201,162,75,0.18);
    --gold:#C9A24B;
    --cream:#F5F1E8;
    --muted:rgba(245,241,232,0.55);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--ink);
    color:var(--cream);
    font-family:'Trebuchet MS', 'Segoe UI', sans-serif;
    min-height:100vh;
  }
  .shell{
    display:grid;
    grid-template-columns: 400px 1fr;
    gap:0;
    min-height:100vh;
  }
  @media (max-width: 900px){
    .shell{ grid-template-columns: 1fr; }
  }

  /* ---------- FORM PANEL ---------- */
  .form-panel{
    background:var(--panel);
    padding:28px 24px 60px;
    border-right:1px solid var(--line);
    overflow-y:auto;
  }
  .form-panel h1{ font-size:17px; letter-spacing:0.04em; color:var(--gold); margin:0 0 4px; }
  .form-panel .sub{ font-size:12px; color:var(--muted); margin-bottom:24px; }
  .field{ margin-bottom:16px; }
  .field label{
    display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.06em;
    color:var(--muted); margin-bottom:6px;
  }
  .field input[type=text], .field input[type=number], .field input[type=date], .field textarea, .field select{
    width:100%; padding:10px 11px; background:#26221b; border:1px solid var(--line);
    border-radius:4px; color:var(--cream); font-family:inherit; font-size:13.5px;
  }
  .field textarea{ resize:vertical; min-height:50px; }
  .field-row{ display:flex; gap:10px; }
  .field-row .field{ flex:1; }
  .brand-toggle{ display:flex; gap:8px; }
  .brand-toggle button{
    flex:1; padding:10px 6px; border-radius:4px; border:1px solid var(--line);
    background:#26221b; color:var(--muted); font-size:12.5px; cursor:pointer; font-family:inherit;
  }
  .brand-toggle button.active{ background:var(--gold); color:#1a1a1a; border-color:var(--gold); font-weight:700; }
  .radio-row{ display:flex; align-items:center; gap:8px; padding:6px 0; font-size:13px; }
  .radio-row input{ accent-color:var(--gold); width:15px; height:15px; }
  .duration-row{ display:flex; gap:8px; }
  .duration-row label{
    flex:1; text-align:center; padding:9px 4px; border:1px solid var(--line); border-radius:4px;
    font-size:13px; cursor:pointer; color:var(--muted); display:block; text-transform:none; letter-spacing:normal;
  }
  .duration-row input{ display:none; }
  .duration-row input:checked + label{ background:var(--gold); color:#1a1a1a; font-weight:700; border-color:var(--gold); }

  /* ---- service items builder ---- */
  .service-card{
    background:#26221b; border:1px solid var(--line); border-radius:6px;
    padding:12px; margin-bottom:10px;
  }
  .service-card .srow{ display:flex; gap:8px; margin-bottom:8px; }
  .service-card .srow input[type=text]{ flex:2; }
  .service-card .srow input[type=number]{ flex:1; }
  .service-card textarea{ font-size:12.5px; }
  .service-card .del{
    background:none; border:1px solid var(--line); color:var(--muted);
    border-radius:4px; cursor:pointer; padding:0 10px; font-size:13px;
  }
  .add-item-btn{
    width:100%; padding:9px; background:none; border:1px dashed var(--line);
    color:var(--gold); border-radius:4px; cursor:pointer; font-size:12.5px; font-family:inherit;
    margin-bottom:16px;
  }
  .divider{ height:1px; background:var(--line); margin:20px 0; }
  .section-label{ font-size:11px; text-transform:uppercase; letter-spacing:0.08em; color:var(--gold); margin-bottom:12px; font-weight:700; }
  .print-btn{
    width:100%; padding:14px; background:var(--gold); color:#1a1a1a; border:none; border-radius:4px;
    font-weight:700; font-size:14px; cursor:pointer; letter-spacing:0.03em; text-transform:uppercase; margin-top:8px;
  }
  .reset-btn{
    width:100%; padding:10px; background:none; color:var(--muted); border:1px solid var(--line);
    border-radius:4px; font-size:12.5px; cursor:pointer; margin-top:8px; font-family:inherit;
  }

  /* ---------- PREVIEW PANEL ---------- */
  .preview-wrap{ padding:40px; display:flex; justify-content:center; background:#0d0c0a; }
  .quote-page{
    width:100%; max-width:820px; background:#fff; color:#1a1a1a;
    font-family:'Arial','Helvetica',sans-serif; box-shadow:0 20px 60px rgba(0,0,0,0.5); overflow:hidden;
  }
  .q-topbar{ padding:26px 40px; display:flex; justify-content:space-between; align-items:center; }
  .q-logo-box{ background:#fff; border-radius:8px; padding:8px 14px; display:flex; align-items:center; gap:12px; }
  .q-logo-box img{ height:52px; display:block; }
  .q-logo-text .q-headline{ font-size:14px; font-weight:700; color:#fff; margin:0 0 2px; }
  .q-logo-text .q-tag{ font-size:10.5px; color:rgba(255,255,255,0.75); margin:0; }
  .q-topright{ text-align:right; color:#fff; }
  .q-topright .q-word{ font-size:20px; font-weight:800; letter-spacing:0.06em; }
  .q-topright .q-city{ font-size:11px; color:rgba(255,255,255,0.7); margin-top:2px; }
  .q-goldbar{ height:5px; }

  .q-body{ padding:36px 40px 20px; }
  .q-info-grid{
    display:grid; grid-template-columns:1fr 1fr; background:#f4f1ea; border-radius:6px;
    padding:18px 22px; margin-bottom:24px;
  }
  .q-info-grid .lbl{ font-size:10px; text-transform:uppercase; letter-spacing:0.06em; color:#888; margin-bottom:4px; }
  .q-info-grid .val{ font-size:15px; font-weight:700; margin-bottom:2px; }
  .q-info-grid .sub{ font-size:12px; color:#777; }

  .q-highlight{
    display:flex; justify-content:space-between; align-items:center; padding:18px 22px;
    border-radius:6px; margin-bottom:28px;
  }
  .q-highlight .htitle{ font-size:13.5px; font-weight:800; text-transform:uppercase; letter-spacing:0.03em; color:#fff; margin:0 0 4px; }
  .q-highlight .hdesc{ font-size:11.5px; color:rgba(255,255,255,0.8); }
  .q-highlight .hprice{ font-size:26px; font-weight:800; color:#fff; text-align:right; }
  .q-highlight .hprice .hsub{ display:block; font-size:10.5px; font-weight:400; color:rgba(255,255,255,0.75); margin-top:2px; }

  .q-section{ margin-bottom:26px; }
  .q-section-title{
    display:flex; align-items:center; gap:8px; font-size:12.5px; font-weight:800;
    text-transform:uppercase; letter-spacing:0.05em; color:#1a1a1a;
    padding-bottom:8px; border-bottom:2px solid #eee; margin-bottom:12px;
  }
  .q-section-title .sq{ width:10px; height:10px; display:inline-block; }

  table.q-tbl{ width:100%; border-collapse:collapse; font-size:12.5px; }
  table.q-tbl thead th{ color:#fff; text-align:left; padding:9px 12px; font-size:10.5px; text-transform:uppercase; letter-spacing:0.04em; }
  table.q-tbl tbody td{ padding:10px 12px; border-bottom:1px solid #eee; vertical-align:top; }
  table.q-tbl tbody tr:nth-child(even){ background:#f8f6f1; }
  table.q-tbl tr.total-row td{ font-weight:800; font-size:14px; border-top:2px solid #1a1a1a; }
  .q-deliverable-name{ font-weight:700; }
  .q-deliverable-qty{ font-weight:400; color:#777; font-size:11.5px; }
  .q-details-list{ margin:0; padding-left:16px; }
  .q-details-list li{ margin-bottom:2px; }

  .q-bullets{ font-size:12.5px; line-height:1.9; color:#333; padding-left:18px; margin:0; }
  .q-bullets li{ margin-bottom:2px; }

  .q-payment-box{ background:#f4f1ea; border-radius:6px; padding:16px 22px; font-size:12.5px; line-height:1.9; }
  .q-payment-box .prow{ display:flex; justify-content:space-between; }
  .q-payment-box .prow span:first-child{ color:#777; }
  .q-payment-box .prow span:last-child{ font-weight:700; }

  .q-footer{
    padding:16px 40px; color:rgba(255,255,255,0.85); font-size:10.5px;
    display:flex; justify-content:space-between; align-items:center;
  }

  @media print{
    .form-panel{ display:none; }
    .shell{ display:block; }
    .preview-wrap{ padding:0; background:#fff; }
    .quote-page{ box-shadow:none; max-width:100%; }
    body{ background:#fff; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- ============ FORM PANEL ============ -->
  <div class="form-panel">
    <h1>Quotation Generator</h1>
    <div class="sub">Details bharo, right side pe ready quotation dikhega — print/PDF le lo.</div>

    <div class="field">
      <label>Brand</label>
      <div class="brand-toggle">
        <button type="button" id="brandLavistaBtn" class="active">Lavista Marketing</button>
        <button type="button" id="brandScalixoBtn">Scalixo Media</button>
      </div>
    </div>

    <div class="field">
      <label for="clientName">Client / Company Name</label>
      <input type="text" id="clientName" placeholder="e.g. 365 Beauty Salon">
    </div>
    <div class="field">
      <label for="clientNiche">Client's Business (optional)</label>
      <input type="text" id="clientNiche" placeholder="e.g. Salon & Beauty Services">
    </div>
    <div class="field">
      <label for="contactPerson">Contact Person (optional)</label>
      <input type="text" id="contactPerson" placeholder="e.g. Mr. Sharma">
    </div>
    <div class="field">
      <label for="partnerName">Prepared By (Partner/Team member)</label>
      <input type="text" id="partnerName" placeholder="e.g. Piyush">
    </div>
    <div class="field">
      <label for="quoteDate">Date</label>
      <input type="date" id="quoteDate">
    </div>

    <div class="divider"></div>
    <div class="section-label">Monthly Deliverables</div>
    <div id="servicesWrap"></div>
    <button type="button" class="add-item-btn" id="addServiceBtn">+ Add deliverable</button>

    <div class="divider"></div>
    <div class="section-label">Package</div>

    <div class="field">
      <label>Package Duration</label>
      <div class="duration-row">
        <input type="radio" name="duration" id="dur4" value="4" checked><label for="dur4">4 months</label>
        <input type="radio" name="duration" id="dur8" value="8"><label for="dur8">8 months</label>
        <input type="radio" name="duration" id="dur12" value="12"><label for="dur12">12 months</label>
      </div>
    </div>
    <div class="field">
      <label for="monthlyPrice">Monthly Package Price (₹)</label>
      <input type="number" id="monthlyPrice" placeholder="e.g. 20000">
    </div>
    <div class="field">
      <label for="packageLabel">Package Name (shown as heading)</label>
      <input type="text" id="packageLabel" placeholder="e.g. Complete Content Package">
    </div>
    <div class="field">
      <label>GST</label>
      <label class="radio-row"><input type="radio" name="gst" id="gstYes" value="yes" checked> With GST (18% — CGST 9% + SGST 9%)</label>
      <label class="radio-row"><input type="radio" name="gst" id="gstNo" value="no"> Without GST</label>
    </div>

    <div class="field">
      <label for="valuePropInput">Why this helps them (optional, one point per line)</label>
      <textarea id="valuePropInput" placeholder="Complete management of Instagram & Facebook&#10;Consistent posting to grow reach every month"></textarea>
    </div>
    <div class="field">
      <label for="notesInput">Extra Notes (optional)</label>
      <textarea id="notesInput" placeholder="Anything extra to mention"></textarea>
    </div>

    <div class="divider"></div>
    <div class="section-label">Payment Details</div>
    <div class="field">
      <label for="bankName">Bank Name</label>
      <input type="text" id="bankName" value="HDFC Bank">
    </div>
    <div class="field">
      <label for="accName">Account Name</label>
      <input type="text" id="accName" value="Deep Thakkar">
    </div>
    <div class="field-row">
      <div class="field">
        <label for="accNumber">Account Number</label>
        <input type="text" id="accNumber" placeholder="Enter account no.">
      </div>
      <div class="field">
        <label for="ifscCode">IFSC Code</label>
        <input type="text" id="ifscCode" value="HDFC0008137">
      </div>
    </div>

    <div class="divider"></div>
    <button type="button" class="print-btn" onclick="window.print()">🖨️ Print / Save as PDF</button>
    <button type="button" class="reset-btn" id="resetBtn">Reset form</button>
  </div>

  <!-- ============ PREVIEW PANEL ============ -->
  <div class="preview-wrap">
    <div class="quote-page" id="quotePage"></div>
  </div>

</div>

<script>
const BRANDS = {
  lavista: {
    name: "Lavista Marketing Agency",
    tagline: "Real Estate Marketing, Reimagined",
    barColor: "#2B2620",
    accent: "#8a6a2f",
    goldBar: "linear-gradient(90deg,#C9A24B,#8a6a2f)",
    logo: "lavista-logo.jpg",
    prefix: "LMA"
  },
  scalixo: {
    name: "Scalixo Media",
    tagline: "More Views • More Followers • More Income",
    barColor: "#101d38",
    accent: "#1f3a5f",
    goldBar: "linear-gradient(90deg,#C9A24B,#B08D57)",
    logo: "scalixo-logo.jpg",
    prefix: "SCX"
  }
};
let currentBrand = 'lavista';
document.getElementById('quoteDate').value = new Date().toISOString().slice(0,10);

document.getElementById('brandLavistaBtn').addEventListener('click', ()=>{
  currentBrand = 'lavista';
  document.getElementById('brandLavistaBtn').classList.add('active');
  document.getElementById('brandScalixoBtn').classList.remove('active');
  renderQuote();
});
document.getElementById('brandScalixoBtn').addEventListener('click', ()=>{
  currentBrand = 'scalixo';
  document.getElementById('brandScalixoBtn').classList.add('active');
  document.getElementById('brandLavistaBtn').classList.remove('active');
  renderQuote();
});

// ---------- Service (deliverable) builder ----------
let serviceCount = 0;
function addServiceCard(prefill){
  serviceCount++;
  const id = 'svc_' + serviceCount;
  const card = document.createElement('div');
  card.className = 'service-card';
  card.dataset.id = id;
  card.innerHTML = `
    <div class="srow">
      <input type="text" class="svc-name" placeholder="Deliverable name e.g. Reel Shoots" value="${prefill?.name || ''}">
      <input type="number" class="svc-qty" placeholder="Qty/month e.g. 6" value="${prefill?.qty || ''}">
    </div>
    <textarea class="svc-details" placeholder="One detail per line, e.g.&#10;2 Reel Shoots – with Influencer&#10;4 Reel Shoots – with Client">${prefill?.details || ''}</textarea>
    <div style="text-align:right; margin-top:6px;">
      <button type="button" class="del" onclick="this.closest('.service-card').remove(); renderQuote();">✕ Remove</button>
    </div>
  `;
  document.getElementById('servicesWrap').appendChild(card);
  card.querySelectorAll('input, textarea').forEach(inp => inp.addEventListener('input', renderQuote));
}
document.getElementById('addServiceBtn').addEventListener('click', ()=> { addServiceCard(); renderQuote(); });

// Seed with example rows matching a typical package (editable/removable)
addServiceCard({ name: "Reel Shoots", qty: "6", details: "2 Reel Shoots – with Influencer + Beautician\n4 Reel Shoots – with Client\nConcept, shoot & full production included" });
addServiceCard({ name: "Graphic Posts", qty: "12", details: "Branded static creatives for Instagram/Facebook\nOffers, tips, festival & promotional posts" });
addServiceCard({ name: "Reel Editing", qty: "10", details: "Editing of reels already shot by client\nTrending audio, captions & transitions added" });

// Wire up live re-render on any input change
document.querySelectorAll('.form-panel input, .form-panel textarea, .form-panel select')
  .forEach(el => el.addEventListener('input', renderQuote));

document.getElementById('resetBtn').addEventListener('click', ()=>{
  document.querySelectorAll('.form-panel input[type=text], .form-panel input[type=number], .form-panel textarea')
    .forEach(el => el.value = '');
  document.getElementById('servicesWrap').innerHTML = '';
  document.getElementById('dur4').checked = true;
  document.getElementById('gstYes').checked = true;
  document.getElementById('quoteDate').value = new Date().toISOString().slice(0,10);
  document.getElementById('bankName').value = 'HDFC Bank';
  document.getElementById('accName').value = 'Deep Thakkar';
  document.getElementById('ifscCode').value = 'HDFC0008137';
  addServiceCard();
  renderQuote();
});

function fmtMoney(n){ return '₹' + n.toLocaleString('en-IN', {maximumFractionDigits:0}); }
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }

function renderQuote(){
  const brand = BRANDS[currentBrand];
  const client = document.getElementById('clientName').value.trim() || '[Client Name]';
  const niche = document.getElementById('clientNiche').value.trim();
  const contact = document.getElementById('contactPerson').value.trim();
  const partner = document.getElementById('partnerName').value.trim() || '[Partner Name]';
  const dateVal = document.getElementById('quoteDate').value;
  const dateStr = dateVal ? new Date(dateVal).toLocaleDateString('en-IN', {day:'numeric', month:'long', year:'numeric'}) : '';
  const duration = document.querySelector('input[name=duration]:checked').value;
  const monthlyPrice = parseFloat(document.getElementById('monthlyPrice').value) || 0;
  const packageLabel = document.getElementById('packageLabel').value.trim() || `${duration}-Month Package`;
  const withGst = document.getElementById('gstYes').checked;
  const valueProp = document.getElementById('valuePropInput').value.trim();
  const notes = document.getElementById('notesInput').value.trim();
  const bankName = document.getElementById('bankName').value.trim();
  const accName = document.getElementById('accName').value.trim();
  const accNumber = document.getElementById('accNumber').value.trim();
  const ifscCode = document.getElementById('ifscCode').value.trim();

  // Gather service cards
  const services = [];
  document.querySelectorAll('.service-card').forEach(card => {
    const name = card.querySelector('.svc-name').value.trim();
    const qty = card.querySelector('.svc-qty').value.trim();
    const details = card.querySelector('.svc-details').value.trim();
    if(name) services.push({ name, qty, details: details ? details.split('\n').filter(Boolean) : [] });
  });

  const subtotal = monthlyPrice * duration;
  const cgst = withGst ? subtotal * 0.09 : 0;
  const sgst = withGst ? subtotal * 0.09 : 0;
  const grandTotal = subtotal + cgst + sgst;
  const quoteNo = `${brand.prefix}/${dateVal ? dateVal.slice(0,4) : new Date().getFullYear()}/${dateVal ? dateVal.slice(5,7)+dateVal.slice(8,10) : ''}`;

  // Monthly Deliverables table (# | Deliverable | Details) — matches the reference PDF layout
  let deliverableRows = services.map((s, i) => `
    <tr>
      <td style="width:30px;">${i+1}</td>
      <td style="width:150px;">
        <div class="q-deliverable-name">${esc(s.name)}</div>
        ${s.qty ? `<div class="q-deliverable-qty">(${esc(s.qty)} / Month)</div>` : ''}
      </td>
      <td>
        ${s.details.length ? `<ul class="q-details-list">${s.details.map(d => `<li>${esc(d)}</li>`).join('')}</ul>` : '—'}
      </td>
    </tr>`).join('');
  if(!deliverableRows) deliverableRows = `<tr><td colspan="3" style="color:#bbb">Add deliverables on the left…</td></tr>`;

  // Package Summary table (Deliverable | Quantity/Month) — flat quick-glance version
  let summaryRows = services.map(s => `
    <tr><td>${esc(s.name)}</td><td style="text-align:right;">${s.qty ? esc(s.qty) : '—'}</td></tr>
  `).join('');

  document.getElementById('quotePage').innerHTML = `
    <div class="q-topbar" style="background:${brand.barColor}">
      <div class="q-logo-box">
        <img src="${brand.logo}" alt="${brand.name} logo" onerror="this.style.display='none'; this.nextElementSibling.querySelector('.q-headline').style.color='#fff';">
        <div class="q-logo-text">
          <p class="q-headline">${brand.name}</p>
          <p class="q-tag">${brand.tagline}</p>
        </div>
      </div>
      <div class="q-topright">
        <div class="q-word">QUOTATION</div>
        <div class="q-city">Ahmedabad, Gujarat</div>
      </div>
    </div>
    <div class="q-goldbar" style="background:${brand.goldBar}"></div>

    <div class="q-body">
      <div class="q-info-grid">
        <div>
          <div class="lbl">Quotation For</div>
          <div class="val">${esc(client)}</div>
          ${niche ? `<div class="sub">${esc(niche)}</div>` : ''}
          ${contact ? `<div class="sub">Attn: ${esc(contact)}</div>` : ''}
        </div>
        <div style="text-align:right;">
          <div class="lbl">Prepared By</div>
          <div class="val">${esc(partner)}</div>
          <div class="sub">${brand.name}, Ahmedabad</div>
        </div>
      </div>

      <div class="q-highlight" style="background:${brand.barColor}">
        <div>
          <p class="htitle">${esc(packageLabel)}</p>
          <p class="hdesc">Quotation No: ${quoteNo} &nbsp;•&nbsp; Date: ${dateStr}</p>
        </div>
        <div class="hprice">${fmtMoney(monthlyPrice * duration)}
          <span class="hsub">total for ${duration} months (${fmtMoney(monthlyPrice)}/month)</span>
        </div>
      </div>

      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Monthly Deliverables</div>
        <table class="q-tbl">
          <thead><tr style="background:${brand.barColor}"><th>#</th><th>Deliverable</th><th>Details</th></tr></thead>
          <tbody>${deliverableRows}</tbody>
        </table>
      </div>

      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Package Summary</div>
        <table class="q-tbl">
          <thead><tr style="background:${brand.barColor}"><th>Deliverable</th><th style="text-align:right;">Quantity / Month</th></tr></thead>
          <tbody>${summaryRows || '<tr><td colspan="2" style="color:#bbb">—</td></tr>'}</tbody>
        </table>
      </div>

      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Investment</div>
        <table class="q-tbl">
          <tbody>
            <tr><td>${esc(packageLabel)}</td><td style="text-align:right">${duration} Months</td></tr>
            <tr><td>Monthly Fee</td><td style="text-align:right">${fmtMoney(monthlyPrice)}</td></tr>
            <tr><td>Subtotal</td><td style="text-align:right">${fmtMoney(subtotal)}</td></tr>
            ${withGst ? `
            <tr><td>CGST @ 9%</td><td style="text-align:right">${fmtMoney(cgst)}</td></tr>
            <tr><td>SGST @ 9%</td><td style="text-align:right">${fmtMoney(sgst)}</td></tr>
            ` : `<tr><td colspan="2" style="color:#999; font-size:11px;">GST not applicable on this quotation</td></tr>`}
            <tr class="total-row"><td>Grand Total</td><td style="text-align:right">${fmtMoney(grandTotal)}</td></tr>
          </tbody>
        </table>
      </div>

      ${valueProp ? `
      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Why This Helps You</div>
        <ul class="q-bullets">${valueProp.split('\n').filter(Boolean).map(l => `<li>${esc(l)}</li>`).join('')}</ul>
      </div>` : ''}

      ${notes ? `
      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Additional Notes</div>
        <p style="font-size:12.5px; color:#333; line-height:1.7;">${esc(notes).replace(/\n/g,'<br>')}</p>
      </div>` : ''}

      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Terms & Notes</div>
        <ul class="q-bullets">
          <li>Package validity: This quotation is valid for 15 days from the date of issue.</li>
          <li>Content calendar and shoot dates will be finalized mutually each month.</li>
          <li>50% advance payment required to commence work; balance as per agreed schedule.</li>
          <li>Any additional services beyond the scope listed above will be billed separately.</li>
        </ul>
      </div>

      <div class="q-section">
        <div class="q-section-title"><span class="sq" style="background:${brand.accent}"></span>Payment Details</div>
        <div class="q-payment-box">
          <div class="prow"><span>Bank Name</span><span>${bankName || '—'}</span></div>
          <div class="prow"><span>Account Name</span><span>${accName || '—'}</span></div>
          <div class="prow"><span>Account Number</span><span>${accNumber || '—'}</span></div>
          <div class="prow"><span>IFSC Code</span><span>${ifscCode || '—'}</span></div>
        </div>
      </div>
    </div>

    <div class="q-footer" style="background:${brand.barColor}">
      <span>${brand.name} | Ahmedabad, Gujarat</span>
      <span>Page 1</span>
    </div>
  `;
}

renderQuote();
</script>
</body>
</html>
